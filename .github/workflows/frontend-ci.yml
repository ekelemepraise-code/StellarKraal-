name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: frontend

jobs:
  ci:
    name: Type-check · Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache node_modules and .next for faster subsequent runs
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            frontend/.next/cache
          key: frontend-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: frontend-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: |
          mkdir -p jest-results
          npm test -- --json --outputFile=jest-results/frontend-results.json || true

      - name: Annotate Jest failures
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportPath = path.join(process.cwd(), 'jest-results', 'frontend-results.json');
            if (!fs.existsSync(reportPath)) return;
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            for (const testResult of report.testResults || []) {
              const file = path.relative(process.cwd(), testResult.name);
              for (const assertion of testResult.assertionResults || []) {
                if (assertion.status !== 'failed') continue;
                const message = `${assertion.ancestorTitles.join(' > ')} > ${assertion.title}\n${assertion.failureMessages.join('\n')}`;
                console.log(`::error file=${file}::${message.replace(/\r?\n/g, '%0A')}`);
              }
            }
            if (!report.success) throw new Error('Frontend component tests failed');

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_NETWORK: testnet
          NEXT_PUBLIC_API_URL: http://localhost:3001

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            frontend/.next/cache
          key: frontend-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: frontend-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_NETWORK: testnet
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Run Lighthouse CI
        run: npx @lhci/cli@0.14.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
