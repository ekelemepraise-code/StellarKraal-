name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run lint

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Run tests with coverage
        env:
          NODE_ENV: test
        run: npm run test:coverage -- --coverageReporters=json-summary --coverageReporters=text --json --outputFile=coverage/jest-unit-results.json || true

      - name: Annotate Jest failures
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportPath = path.join(process.cwd(), 'coverage', 'jest-unit-results.json');
            if (!fs.existsSync(reportPath)) return;
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            for (const testResult of report.testResults || []) {
              const file = path.relative(process.cwd(), testResult.name);
              for (const assertion of testResult.assertionResults || []) {
                if (assertion.status !== 'failed') continue;
                const message = `${assertion.ancestorTitles.join(' > ')} > ${assertion.title}\n${assertion.failureMessages.join('\n')}`;
                console.log(`::error file=${file}::${message.replace(/\r?\n/g, '%0A')}`);
              }
            }
            if (!report.success) throw new Error('Backend unit tests failed');

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

      - name: Post coverage comment
        if: always() && github.event_name == 'pull_request'
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          coverage-file: backend/coverage/coverage-summary.json
          base-coverage-file: backend/coverage/coverage-summary.json
          working-directory: backend
